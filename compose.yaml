services:
  db:
    image: postgres:16
    container_name: honeypot-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s

  api:
    build: ./api
    container_name: honeypot-api
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  dashboard:
    build: ./dashboard
    container_name: honeypot-dashboard
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "${DASHBOARD_PORT}:8501"
    depends_on:
      api:
        condition: service_healthy

  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeypot-cowrie
    ports:
      - "2222:2222"
    environment:
      COWRIE_TELNET_ENABLED: "yes"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var
      - cowrie_etc:/cowrie/cowrie-git/etc

  shipper:
    build: ./shipper
    container_name: honeypot-shipper
    environment:
      API_URL: http://api:8000
      COWRIE_JSON_LOG: /cowrie/cowrie-git/var/log/cowrie/cowrie.json
      SHIPPER_STATE_DIR: /data
      SHIPPER_BATCH_SLEEP: "0.1"
    volumes:
      - cowrie_var:/cowrie/cowrie-git/var:ro
      - shipper_state:/data
    depends_on:
      cowrie:
        condition: service_started
      api:
        condition: service_healthy
    restart: on-failure:5

volumes:
  postgres_data:
  cowrie_var:
  cowrie_etc:
  shipper_state:
