name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: honeyuser
          POSTGRES_PASSWORD: honeypass
          POSTGRES_DB: honeypot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U honeyuser -d honeypot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 8

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest httpx

      - name: Inicializar esquema de BD
        env:
          PGPASSWORD: honeypass
        run: |
          psql -h 127.0.0.1 -U honeyuser -d honeypot -f db/init.sql

      - name: Ejecutar tests
        env:
          POSTGRES_USER: honeyuser
          POSTGRES_PASSWORD: honeypass
          POSTGRES_DB: honeypot
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
        run: |
          cd api
          pytest tests/ -v
